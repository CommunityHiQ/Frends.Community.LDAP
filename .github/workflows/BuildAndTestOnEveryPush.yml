name: BuildAndTestOnEveryPush.yml

on:
  push:
    branches-ignore:
      - master
      
# nice example: https://github.com/microsoft/vs-editor-api/blob/master/.github/workflows/main.yml

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
    steps:
    - uses: actions/checkout@v1

    - name: Build
      run: dotnet build
    
# Omit test for now, as they require vpn connection to ad server	
#    - name: Test
#      run: dotnet test

#      env:
#         HiQAzureADTestAddress: 'Foobar'
#         HiQAzureADTestPassword: ${{ secrets.HiQAzureADTestPassword }}
#         HiQAzureADTestUser: ${{ secrets.HiQAzureADTestUser }}
      
    - name: Pack release version of task
      if: runner.os == 'Windows' 
      run: dotnet pack --configuration Release --include-source
      
    - name: Get package name
      id: package_name
      run: |
        $pkg = Get-ChildItem -Path . -Filter *.nupkg -Exclude *.symbols.nupkg -Recurse | Select-Object -First 1
        echo "full_name=$($pkg.FullName)" >> $env:GITHUB_OUTPUT
      
    - name: Push to Frends Community Test Feed
      shell: bash
      run: |       
        curl -X POST "https://frends-fsp-cloudprod-agent.frendsapp.com/api/community-tasks/v1/push?feed_type=test" \
          -H "x-api-key: ${{ secrets.FRENDS_COMMUNITY_TASKS_API_KEY }}" \
          -H "Content-Type: application/octet-stream" \
          --data-binary @"${{ steps.package_name.outputs.full_name }}"
